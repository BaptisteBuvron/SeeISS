messageRealTime: La vidéo en direct de la Station spatiale internationale comprend des vues internes
  lorsque l'équipage est en service et des vues de la Terre à d'autres moments. La vidéo est
  accompagnée de l'audio des conversations entre l'équipage et le contrôle de mission. Cette vidéo
  n'est disponible que lorsque la station spatiale est en contact avec le sol.

messageRealTime2: Pendant les périodes de « perte de signal », les téléspectateurs verront un écran bleu. Étant donné que la station tourne autour de la Terre toutes les 90 minutes, elle connaît un lever ou un coucher de soleil toutes les 45 minutes environ. Lorsque la station est dans l'obscurité, la vidéo de la caméra externe peut apparaître en noir, mais peut parfois fournir des vues spectaculaires des éclairs ou des lumières de la ville en dessous.

issVisible: La station spatiale internationale est régulièrement visible à l'oeil nu.
visiblePoint: Elle apparaît comme un point plus ou moins lumineux.
timeIss: Ce site indique les horaires de passage de l'ISS ainsi que la direction d'arrivée et de fin.
siteDescription: Suivez l'ISS en direct et prévoyez ses passages visibles depuis chez vous.
heroTitle: Suivez <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 via-indigo-500 to-purple-600 dark:from-indigo-400 dark:via-purple-400 dark:to-indigo-300">l'ISS en direct</span> et observez-la depuis chez vous
heroSubtitle: Calculez précisément les horaires, la luminosité et la trajectoire des passages de la Station Spatiale au-dessus de votre position.
livePromoTitle: Suivi en direct de l'ISS
livePromoDesc: Regardez la Terre en direct depuis la station et suivez sa trajectoire en temps réel.
